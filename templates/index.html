<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI双周产品周报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors:{
            paperBg:{
            DEFAULT:'#f7f3e8',
            dark:'#111827'
          },

            inkDark:{
            DEFAULT:'#111111',
            dark:'#f8fafc'
          },

            inkMid:{
            DEFAULT:'#333333',
            dark:'#cbd5e1'
          },

            inkLight:{
            DEFAULT:'#555555',
            dark:'#94a3b8'
          },

          sealRed:'#a62c2c',
          bambooGreen:'#506d4e',
          oldCyan:'#365772',
          bronzeGold:'#b8945c',
        },
          fontFamily: {
            song: ['"Noto Serif SC"', 'serif'],
          },
          animation: {
            slideBase: 'paperSlideUp 0.55s ease-out forwards',
            dotBreathe: 'dotBreathe 2.4s ease-in-out infinite',
            softFloat: 'softFloat 5s ease-in-out infinite',
            pressPaper: 'pressPaper 0.18s ease-out',
          },
          keyframes: {
            paperSlideUp: {
              from: { opacity: '0', transform: 'translateY(22px)' },
              to: { opacity: '1', transform: 'translateY(0)' }
            },
            dotBreathe: {
              '0%,100%': { boxShadow: '0 0 4px #a62c2c' },
              '50%': { boxShadow: '0 0 10px #a62c2c, 0 0 18px #a62c2c40' }
            },
            softFloat: {
              '0%,100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' }
            },
            pressPaper: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(0.97)' },
              '100%': { transform: 'scale(1)' }
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .paper-texture {
        background-image:
          radial-gradient(circle at 12% 15%, rgba(17, 17, 17, 0.025) 0%, transparent 55%),
          radial-gradient(circle at 88% 25%, rgba(166, 44, 44, 0.03) 0%, transparent 50%),
          linear-gradient(180deg, #f7f3e8 0%, #efe9dd 100%);
      }
      .dark .paper-texture {
        background-image:
          radial-gradient(circle at 12% 15%, rgba(255, 255, 255, 0.02) 0%, transparent 55%),
          radial-gradient(circle at 88% 25%, rgba(166, 44, 44, 0.05) 0%, transparent 50%),
          linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      }
      .grain-filter::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
      }
      .wood-border {
        border: 2px solid #111111;
        box-shadow: 5px 5px 0 #111111;
        border-radius: 0.4rem;
      }
      .dark .wood-border {
        border-color: #f8fafc;
        box-shadow: 5px 5px 0 #0f172a, 0 0 0 1px #f8fafc;
      }
      .wood-border-sm {
        border: 1px solid #111111;
        box-shadow: 2px 2px 0 #111111;
        border-radius: 0.3rem;
      }
      .dark .wood-border-sm {
        border-color: #f8fafc;
        box-shadow: 2px 2px 0 #0f172a;
      }
      .timeline-axis {
        position: absolute;
        left: 18px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: repeating-linear-gradient(180deg, #111111, #111111 8px, transparent 8px, transparent 16px);
      }
      .dark .timeline-axis {
        background: repeating-linear-gradient(180deg, #cbd5e1, #cbd5e1 8px, transparent 8px, transparent 16px);
      }
      .timeline-dot {
        position: absolute;
        left: 12px;
        top: 28px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #a62c2c;
        border: 2px solid #f7f3e8;
        animation: dotBreathe 2.4s infinite;
        z-index: 2;
      }
      .dark .timeline-dot {
        border-color: #0f172a;
      }
      .card-paper-hover {
        transition: all 0.3s ease;
      }
      .card-paper-hover:hover {
        transform: translateY(-5px);
        box-shadow: 7px 7px 0 #111111, 0 0 12px rgba(166, 44, 44, 0.12);
      }
      .dark .card-paper-hover:hover {
        box-shadow: 7px 7px 0 #0f172a, 0 0 0 1px #f8fafc, 0 0 12px rgba(166, 44, 44, 0.2);
      }
      .card-paper-hover:active {
        animation: pressPaper 0.18s;
      }
      .article-title {
        font-size: 1.35rem;
        font-weight: 700;
        color: #111111;
        transition: color 0.28s ease, transform 0.28s ease;
      }
      .dark .article-title {
        color: #f1f5f9;
      }
      .card-paper-hover:hover .article-title {
        color: #a62c2c;
        transform: translateX(3px);
      }
      .dark .card-paper-hover:hover .article-title {
        color: #f87171;
      }
      .tag-label {
        transition: transform 0.24s ease;
      }
      .card-paper-hover:hover .tag-label {
        transform: scale(1.04);
      }
      .btn-paper {
        transition: all 0.2s ease;
      }
      .btn-paper:hover {
        transform: translateY(-1px);
      }
      .btn-paper:active {
        transform: translateY(1px);
      }
      .header-banner {
        width: 100%;
        border-radius: 0.3rem;
        border: 1px solid #111111;
        margin-top: 1.25rem;
        overflow: hidden;
      }
      .dark .header-banner {
        border-color: #f8fafc;
      }
      .header-banner img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }

      /* 主题切换按钮 */
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.9rem;
        border: 1px solid #111111;
        box-shadow: 2px 2px 0 #111111;
        border-radius: 0.3rem;
        background: #f7f3e8;
        color: #111111;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }
      .theme-toggle:hover {
        transform: translateY(-1px);
        background: #ffffff;
      }
      .theme-toggle:active {
        transform: translateY(1px);
        box-shadow: 1px 1px 0 #111111;
      }
      .dark .theme-toggle {
        background: #1e293b;
        color: #f8fafc;
        border-color: #f8fafc;
        box-shadow: 2px 2px 0 #0f172a;
      }
      .dark .theme-toggle:hover {
        background: #334155;
      }
    }
  </style>
  <style>
.cat-btn {
  transition: all 0.2s ease;
  cursor: pointer;
}

.cat-btn:hover {
  transform: translateY(-2px);
  background: #f3f4f6;
}

.cat-btn.active {
  background: #1f2937;
  color: white;
  transform: scale(1.03);
}

/* 暗色模式 */
.dark .cat-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}

.dark .cat-btn.active {
  background: #f1f5f9;
  color: #111827;
}
</style>
</head>
<body class="
paper-texture
grain-filter
font-song
text-inkDark
relative
min-h-screen
">

<script>
  // 主题：在 head 末尾同步读取 localStorage，避免首屏闪烁
  (function () {
    try {
      var saved = localStorage.getItem('wb-theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    } catch (e) {}
  })();
</script>

<div class="container mx-auto px-4 md:px-6 py-10 max-w-7xl relative z-10">

  <!-- 顶部标题固定卡片 -->
  <div class="wood-border bg-paperBg dark:bg-gray-900 p-6 md:p-8 mb-8 animate-slideBase">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold tracking-wide flex items-center gap-3 text-inkDark dark:text-gray-100">
          <i class="fa fa-newspaper-o text-sealRed animate-softFloat"></i>
          AI 周报
        </h1>
        <div class="mt-3 space-y-1 text-inkMid dark:text-gray-300">
          <p><span class="font-semibold">本期编辑：</span>产品资讯归档组</p>
          <p><span class="font-semibold">本期统计周期：</span>2026.06.22 — 2026.07.05（双周）</p>
        </div>
        <p class="text-inkLight dark:text-gray-400 mt-2">每两周一归档 · 原文直达 · 行业资讯分类汇总</p>
      </div>
      <div class="flex gap-3 flex-wrap items-center">
        <input id="searchInput" type="text" placeholder="搜索标题、标签、关键词"
          class="w-full md:w-72 px-4 py-2.5 wood-border-sm bg-paperBg dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-400 focus:outline-none focus:bg-white dark:focus:bg-gray-700 transition-all text-inkDark">
        <button id="themeToggle" class="theme-toggle" title="切换亮/暗主题" aria-label="切换主题">
          <i id="themeIcon" class="fa fa-moon-o"></i>
          <span id="themeLabel">暗色</span>
        </button>
        <button data-action="export" class="bg-inkDark dark:bg-gray-100 text-paperBg dark:text-gray-900 px-5 py-2.5 wood-border-sm hover:bg-sealRed btn-paper">
          <i class="fa fa-download mr-1"></i>导出完整周报
        </button>
      </div>
    </div>
    <!-- 标题卡片底部固定图片位 -->
    <div class="header-banner">
      <img src="https://p3-flow-image-sign.byteimg.com/ocean-cloud-tos/49373505012047106/1751006829393990b79f0a99c49373505012047106.png~tplv-vm77ns7g98-image.png?rk3s=18ea6f23&x-expires=1768184621&x-signature=Zt5%2B9yGzSbMk5R%2FmZqK%2BfXqN17U%3D" alt="周报横幅">
    </div>
  </div>

  <!-- 周期选择栏 -->
<div class="wood-border-sm bg-paperBg dark:bg-gray-900 p-5 mb-8 animate-slideBase" style="animation-delay:0.12s">

  <div class="flex flex-wrap justify-between items-center gap-4">

    <div class="flex items-center gap-3">

      <span class="font-semibold text-sealRed">
        切换归档期数：
      </span>


      <select 
        id="weekSelect"
        class="px-3 py-2 wood-border-sm bg-paperBg dark:bg-gray-800 outline-none text-inkDark dark:text-gray-100">

        <option>
          加载中...
        </option>

      </select>


    </div>


    <div class="flex items-center gap-3">

      <span class="font-semibold text-sealRed">
        当前归档期：
      </span>


      <span 
        id="currentWeek"
        class="px-3 py-2 wood-border-sm bg-paperBg dark:bg-gray-800 text-inkDark dark:text-gray-100">

        --

      </span>


    </div>


  </div>

</div>

</div>
    </div>
  </div>


  <!-- 主体容器 -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- 左侧资讯容器：卡片100%自动生成，无手写HTML -->
    <div class="lg:col-span-2 relative pl-10" id="articleWrap">
      <div class="timeline-axis"></div>
    </div>

    <!-- 右侧边栏 -->
    <div class="lg:col-span-1 space-y-7">
      <!-- 热榜容器：自动生成 -->
      <div class="wood-border bg-paperBg dark:bg-gray-900 p-6 animate-slideBase" style="animation-delay:0.36s">
        <h2 class="text-xl font-semibold text-sealRed mb-5 flex items-center gap-2">
          <i class="fa fa-fire text-sealRed animate-softFloat"></i>本期热点资讯
        </h2>
        <div id="hotWrap" class="space-y-4"></div>
      </div>
      <!-- 操作面板固定 -->
      <div class="wood-border bg-paperBg dark:bg-gray-900 p-6 animate-slideBase" style="animation-delay:0.48s">
        <h2 class="text-xl font-semibold text-bambooGreen mb-5 flex items-center gap-2">
          <i class="fa fa-cogs text-bambooGreen"></i>周报快捷操作
        </h2>
        <div id="quickStatus" class="hidden mb-4 p-3 rounded-sm bg-sealRed/5 dark:bg-sealRed/10 border border-sealRed/30 text-sm">
          <div class="flex items-center justify-between">
            <span class="text-sealRed font-semibold" id="quickStatusName">任务进行中…</span>
            <span class="text-inkLight dark:text-gray-400" id="quickStatusPercent">0%</span>
          </div>
          <div class="mt-2 h-1.5 bg-inkDark/10 dark:bg-white/10 rounded-full overflow-hidden">
            <div id="quickStatusBar" class="h-full bg-sealRed transition-all duration-300" style="width:0%"></div>
          </div>
          <p class="mt-2 text-inkMid dark:text-gray-300 text-xs" id="quickStatusMsg"></p>
        </div>
        <div class="space-y-3">
          <button data-action="collect" class="w-full text-left p-3 rounded-sm bg-inkDark/5 dark:bg-white/10 hover:bg-inkDark/10 dark:hover:bg-white/20 text-sm btn-paper text-inkDark dark:text-gray-200">
            <i class="fa fa-plus-circle mr-2 text-sealRed"></i>新增本期资讯
          </button>
          <button data-action="summarize" class="w-full text-left p-3 rounded-sm bg-inkDark/5 dark:bg-white/10 hover:bg-inkDark/10 dark:hover:bg-white/20 text-sm btn-paper text-inkDark dark:text-gray-200">
            <i class="fa fa-list-alt mr-2 text-oldCyan"></i>批量整理周报摘要
          </button>
          <button data-action="export" class="w-full text-left p-3 rounded-sm bg-inkDark/5 dark:bg-white/10 hover:bg-inkDark/10 dark:hover:bg-white/20 text-sm btn-paper text-inkDark dark:text-gray-200">
            <i class="fa fa-file-text mr-2 text-sealRed"></i>生成完整周报文档
          </button>
          <button data-action="archive" class="w-full text-left p-3 rounded-sm bg-inkDark/5 dark:bg-white/10 hover:bg-inkDark/10 dark:hover:bg-white/20 text-sm btn-paper text-inkDark dark:text-gray-200">
            <i class="fa fa-history mr-2 text-bambooGreen"></i>往期周报归档库
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module"
        src="{{ url_for('static', filename='js/app.js') }}">
</script>
<script type="module">
  // 主题切换：同步 localStorage + 切换 html.dark
  import { initThemeToggle } from "{{ url_for('static', filename='js/theme.js') }}";
  initThemeToggle();
</script>
</body>
</html>
