name: Generate AI Weekly

on:
  schedule:
    # 每天北京时间上午9点
    # GitHub Actions 使用 UTC，所以是 1 点
    - cron: "0 1 * * *"

  workflow_dispatch:


jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Generate Weekly
        env:
          # 只有密钥必须走 secrets；端点和模型用字面量，避免 secret 不存在时
          # 展开为空字符串导致 OpenAI SDK 回退到 https://api.openai.com/v1
          # （用 ARK Key 请求 OpenAI 官方端点 → 401 "Incorrect API key provided"）
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
          ARK_MODEL: ${{ secrets.ARK_MODEL }}
          ARK_IMAGE_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
          ARK_IMAGE_MODEL: doubao-seedream-4-5-251128
        run: |
          python generate_weekly.py --days 14
