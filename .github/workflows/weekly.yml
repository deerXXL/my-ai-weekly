name: Generate AI Weekly

on:
  schedule:
    # 每天北京时间上午9点
    # GitHub Actions 使用 UTC，所以是 1 点
    - cron: "0 1 * * *"

  workflow_dispatch:


jobs:
  generate:
    runs-on: ubuntu-latest

    # env 必须在 job 级别，Verify 与 Generate 两个步骤才能共享同一套变量。
    # 若只挂在某个 step 上，其他 step 读不到 $ARK_API_KEY，诊断会被误判为空。
    env:
      # CI 配置必须与本地 .env 完全一致（本地已验证可跑通）。
      # 关键：端点用 coding 端点 /api/coding/v3 + ark-code-latest，
      # 不是标准 /api/v3。用 ARK Key 请求错误端点会 401。
      # 只有 ARK_API_KEY 走 secrets；其余用字面量，避免 secret 不存在时
      # 展开为空字符串 → OpenAI SDK 回退到 https://api.openai.com/v1 → 401。
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/coding/v3
      ARK_MODEL: ark-code-latest
      ARK_IMAGE_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
      ARK_IMAGE_MODEL: doubao-seedream-4-5-251128

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Verify API config
        run: |
          echo "::group::🔑 API 配置诊断（key 已脱敏）"
          if [ -z "$ARK_API_KEY" ]; then
            echo "::error::ARK_API_KEY 为空！请在 Settings → Secrets → Actions 中配置 ARK_API_KEY"
            exit 1
          fi
          MASKED_KEY="${ARK_API_KEY:0:4}***${ARK_API_KEY: -4}"
          echo "ARK_API_KEY=$MASKED_KEY"
          echo "ARK_BASE_URL=${ARK_BASE_URL:-<EMPTY>}"
          echo "ARK_MODEL=${ARK_MODEL:-<EMPTY>}"
          echo "ARK_IMAGE_BASE_URL=${ARK_IMAGE_BASE_URL:-<EMPTY>}"
          echo "ARK_IMAGE_MODEL=${ARK_IMAGE_MODEL:-<EMPTY>}"
          # 关键校验：防止请求打到 OpenAI 官方端点（用 ARK Key 会 401）
          if [[ "$ARK_BASE_URL" != https://ark.* ]]; then
            echo "::error::ARK_BASE_URL 异常: '$ARK_BASE_URL'。必须以 https://ark 开头（火山方舟端点），否则会用 ARK Key 请求 OpenAI 官方端点导致 401"
            exit 1
          fi
          echo "::endgroup::"

      - name: Generate Weekly
        run: |
          python generate_weekly.py --days 14
